<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .titulo{
            color: darkred;
            font-size: 20px;
            text-align: center;
        }

        .menu{
            display: inline;
            color: aliceblue;
            background-color: black;
            width:  1000px;
            height: 1000px;

        }

        .menu_block{
            display:block;
            color: yellow;
            background-color: lightslategray;
            width: 400px;
            height: 200px;
            border: 1px solid black;
        }
    </style>
</head>
<body>
     <h1 class="titulo">Elementos inline</h1>
     <div class="menu">productos</div>
     <div class="menu">servicios</div>
     <div class="menu">contacto</div>
     <hr />
     <h1>Elementos block</h1>
    <div class="menu_block">productos</div>
     <div class="menu_block">servicios</div>
     <div class="menu_block">contacto</div>
</body>
</html>
